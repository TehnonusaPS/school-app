<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>school-app</title>
    <script>
      // Inisialisasi dark mode sebelum Vue mount → cegah FOUC
      (function () {
        try {
          var theme = localStorage.getItem('theme')
          if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
          }
        } catch (e) {}
      })()
    </script>
    <script type="module" crossorigin src="/assets/index-hYd8_IDz.js"></script>
    <link rel="modulepreload" crossorigin href="/assets/createLucideIcon-Bva5QUpR.js">
    <link rel="stylesheet" crossorigin href="/assets/index-D-Ddkmp8.css">
  </head>
  <body>
    <script>
      // Terapkan theme class ke body (harus di dalam body agar document.body tersedia)
      (function () {
        try {
          var style = localStorage.getItem('themeStyle') || 'blue'
          if (style === 'tahoe') style = 'blue'
          document.body.classList.add('theme-' + style)
          var finish = localStorage.getItem('themeFinish') || 'glossy'
          if (finish === 'solid') document.body.classList.add('finish-solid')
        } catch (e) {}
      })()
    </script>
    <div id="app"></div>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>school-app</title>
    <script>
      // Inisialisasi dark mode sebelum Vue mount → cegah FOUC
      (function () {
        try {
          var theme = localStorage.getItem('theme') || 'system'
          if (theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
          }
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <script>
      // Terapkan theme class ke body (harus di dalam body agar document.body tersedia)
      (function () {
        try {
          var style = localStorage.getItem('themeStyle') || 'blue'
          if (style === 'tahoe') style = 'blue'
          document.body.classList.add('theme-' + style)
          var finish = localStorage.getItem('themeFinish') || 'glossy'
          if (finish === 'solid') document.body.classList.add('finish-solid')
          
          // Background Style
          var bgStyle = localStorage.getItem('backgroundStyle') || 'animated'
          document.body.classList.add('bg-' + bgStyle)
        } catch (e) {}
      })()
    </script>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
